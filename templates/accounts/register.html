{% extends "base.html" %} {% block content %}
{%if not request.user.is_authenticated%}
<form action="." method="POST">
  {% csrf_token %}
  {{form.as_p}}
  <button type="submit">Register</button>
</form>
{%else%}
<p>Already have an account. <a href="/login/">Login</a></p>
{%endif%}
{% endblock content %}
